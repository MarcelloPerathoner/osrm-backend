name: Windows Build

on:
  workflow_call:
    inputs:
      build-type:
        required: true
        type: string

env:
  EXE: .exe
  BUILD_TYPE: ${{ inputs.build-type }}
  # versions
  CONAN_VERSION: 2.24.0
  # paths
  BUILD_DIR: ${{ github.workspace }}/build
  TEST_DIR: ${{ github.workspace }}/test
  LOG_DIR: ${{ github.workspace }}/test/logs
  NAPI_DIR: ${{ github.workspace }}/lib/binding_napi_v8
  CONAN_HOME: ${{ github.workspace }}/.conan2
  VENV_DIR: ${{ github.workspace }}/.venv

  ENABLE_LTO: ON

  ENABLE_CCACHE: OFF
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_TEMPDIR: ${{ github.workspace }}/.ccache-temp
  CCACHE_COMPRESS: 1

  ENABLE_SCCACHE: ON
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

  NODEJS_TESTS: ON
  PUBLISH: OFF

defaults:
  run:
    shell: bash

jobs:
  conan-node:
    name: conan-${{ inputs.build-type }}-node
    runs-on: windows-2025
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup environment
        env:
          TEMP: ${{ runner.temp }}
        run: |
          mkdir -p $BUILD_DIR $TEST_DIR $LOG_DIR $CONAN_HOME $CCACHE_DIR $CCACHE_TEMPDIR $SCCACHE_DIR
          echo "TEMP=$TEMP" >> "$GITHUB_ENV"
          echo "JOBS=$((`nproc` + 1))" >> "$GITHUB_ENV"
          echo "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Tools/MSVC/14.44.35207/bin/Hostx64/x64/" >> "$GITHUB_PATH"

      # Node

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup node environment
        run: |
          PACKAGE_JSON_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo PUBLISH=$([[ "${GITHUB_REF:-}" == "refs/tags/v${PACKAGE_JSON_VERSION}" ]] && echo "ON" || echo "OFF") >> "$GITHUB_ENV"
          npm config set script-shell "C:\\Program Files\\Git\\bin\\bash.exe"
          npm install --ignore-scripts
          npm link --ignore-scripts

      # CCache

      - name: Install SCCache
        if: ${{ env.ENABLE_SCCACHE == 'ON'}}
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore SCCache
        id: cache-sccache-restore
        uses: actions/cache/restore@v4
        if: ${{ env.ENABLE_SCCACHE == 'ON' }}
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: windows-sccache-${{ github.sha }}
          restore-keys: |
            windows-sccache-

      - name: Restore CCache
        id: cache-ccache-restore
        uses: actions/cache/restore@v4
        if: ${{ env.ENABLE_CCACHE == 'ON' }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: windows-ccache-${{ github.sha }}
          restore-keys: |
            windows-ccache-

      # PIP install Conan and cache it

      - name: Restore Python cache
        uses: actions/cache/restore@v4
        id: cache-python-restore
        with:
          path: ${{ env.VENV_DIR }}
          key: windows-python-conan-124-${{ env.CONAN_VERSION }}

      - name: Activate Python
        if: steps.cache-python-restore.outputs.cache-hit == 'true'
        run: |
          echo "${{ env.VENV_DIR }}/.venv/Scripts" >> "$GITHUB_PATH"

      - name: Pip install Conan
        if: steps.cache-python-restore.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          echo "${{ env.VENV_DIR }}/.venv/Scripts" >> "$GITHUB_PATH"
          echo "::group::Scripts/Activate"
          cat .venv/Scripts/Activate
          echo "::endgroup::"
          source .venv/Scripts/Activate
          python3 -m pip install conan==${CONAN_VERSION}

      - name: Save Python cache
        uses: actions/cache/save@v4
        if: steps.cache-python-restore.outputs.cache-hit != 'true'
        with:
          path: ${{ env.VENV_DIR }}
          key: ${{ steps.cache-python-restore.outputs.cache-primary-key }}

      # Conan cache

      - name: Restore Conan cache
        uses: actions/cache/restore@v4
        id: cache-conan-restore
        with:
          path: ${{ env.CONAN_HOME }}
          key: windows-conan-${{ hashFiles('conanfile.py') }}

      - name: Run Conan install
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          echo "::group::$PATH"
          echo "$PATH"
          echo "::endgroup::"

          which conan
          conan --version
          conan profile detect --force
          conan install .. --output-folder=. --build=missing -s:a compiler.cppstd=20 -s:a build_type=${BUILD_TYPE}

          echo "::group::Conan cache contents"
          conan list
          echo "::endgroup::"

          echo "::group::Conan DLL paths"
          cat *.runpath
          echo "::endgroup::"

          # magic, adds DLL paths, see: conanfile.py
          while read -r line; do echo "$line" >> "$GITHUB_PATH"; done < *.runpath

      - name: Save Conan cache
        uses: actions/cache/save@v4
        if: always() && steps.cache-conan-restore.outputs.cache-hit != 'true'
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ steps.cache-conan-restore.outputs.cache-primary-key }}

      # Build

      - name: Cmake
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          echo "::group::cmake --help"
          which cmake
          cmake --version
          cmake --help
          echo "::endgroup::"

          echo "::group::cl.exe -HELP"
          cl.exe -HELP
          which cl.exe
          echo "::endgroup::"

          echo "::group::ccache --help"
          ccache --help
          which ccache
          echo "::endgroup::"

          echo "::group::cat conan_toolchain.cmake"
          cat conan_toolchain.cmake
          echo "::endgroup::"

          # echo "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Tools/MSVC/14.44.35207/bin/Hostx64/x64/" >> "$GITHUB_PATH"

          export CCACHE_COMPILER=cl.exe
          export CCACHE_COMPILERTYPE=msvc
          export SCCACHE_COMPILER=cl.exe
          export SCCACHE_COMPILERTYPE=msvc

          echo "::group::cmake .."
          # this also sets OSRM_BUILD_DIR (see CMakeLists.txt)
          # defaults to: -G "Visual Studio 17 2022" -A x64 \
          cmake .. -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
                   -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
                   -DENABLE_CONAN=ON \
                   -DSKIP_CONAN_INSTALL=ON \
                   -DENABLE_NODE_BINDINGS=ON \
                   -DENABLE_LTO=${ENABLE_LTO} \
                   -DENABLE_CCACHE=${ENABLE_CCACHE} \
                   -DENABLE_SCCACHE=${ENABLE_SCCACHE}
          echo "::endgroup::"

          # cat cl_exe_path >> "$GITHUB_PATH"

      - name: Build
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          echo "::group::cmake --build"
          cmake --build . --config ${BUILD_TYPE} -j ${JOBS}
          echo "::endgroup::"

          echo "::group::ls build/"
          ls -al
          echo "::endgroup::"

          echo "::group::ls build/${BUILD_TYPE}/"
          ls -al ${BUILD_TYPE}/
          echo "::endgroup::"

      # Test

      # TODO: MSVC goes out of memory when building our tests
      # - name: Run unit tests
      #   working-directory: ${{ env.BUILD_DIR }}
      #   run: |
      #     cmake --build . --config ${BUILD_TYPE}  -j ${JOBS} --target tests
      #     # TODO: run tests

      - name: Save CCache directory
        if: ${{ env.ENABLE_CCACHE == 'ON'}}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.cache-ccache-restore.outputs.cache-primary-key }}

      - name: Save SCCache directory
        if: ${{ env.ENABLE_SCCACHE == 'ON'}}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.cache-sccache-restore.outputs.cache-primary-key }}

      - name: Run nodejs tests
        if: ${{ env.NODEJS_TESTS == 'ON' }}
        continue-on-error: true
        run: |
          make -C ${TEST_DIR}/data
          # do not use the following: it doesn't know about .exe files
          # npm run nodejs-tests
          ${NAPI_DIR}/osrm-datastore.exe "${TEST_DIR}/data/ch/monaco.osrm"
          node ${TEST_DIR}/nodejs/index.js | npx faucet

      - name: Run Cucumber tests
        working-directory: ${{ env.BUILD_DIR }}
        continue-on-error: true
        run: |
          npm run lint

          echo "::group::PATH"
          echo $PATH
          echo "::endgroup::"

          # smoke test (see if we can find the DLLs)
          ${OSRM_BUILD_DIR}/osrm-extract.exe --version

          npm test -- --parallel $JOBS

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: failure() || success()
        with:
          if-no-files-found: ignore
          name: conan-windows-release-test-logs
          path: ${{ env.LOG_DIR }}

      - name: Build Node package
        run: ./scripts/ci/node_package.sh

      - name: Publish Node package
        if: ${{ env.PUBLISH == 'ON' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: build/stage/**/*.tar.gz
          omitBody: true
          omitBodyDuringUpdate: true
          omitName: true
          omitNameDuringUpdate: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
